<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Automation Agent | Live Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>SEO Agent</span>
            </div>
            <nav class="nav-group">
                <div class="nav-item active"><i class="fa-solid fa-house"></i>Dashboard</div>
                <div class="nav-item"><i class="fa-solid fa-wand-sparkles"></i>Content Generator</div>
                <div class="nav-item"><i class="fa-solid fa-magnifying-glass-chart"></i>Keyword Research</div>
                <div class="nav-item"><i class="fa-solid fa-book"></i>Content Log</div>
                <div class="nav-item"><i class="fa-solid fa-chart-line"></i>Analytics</div>
                <div class="nav-item"><i class="fa-solid fa-gear"></i>Settings</div>
            </nav>
            <div class="agent-status">
                <div class="status-pulse"></div>
                <div class="status-info">
                    <span class="status-name">Agent: Active</span>
                    <span class="status-label">Online</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>SEO Performance Dashboard</h1>
                <div class="date-picker">Last 7 Days</div>
            </header>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Top Ranking</h3>
                    <div class="stat-value">#1</div>
                    <div class="stat-label">"AI Automation Tools"</div>
                </div>
                <div class="stat-card">
                    <h3>Avg. CTR</h3>
                    <div class="stat-value">12.4%</div>
                    <div class="stat-label">+2.1% from last week</div>
                </div>
                <div class="stat-card">
                    <h3>Content Gen</h3>
                    <div class="stat-value">28</div>
                    <div class="stat-label">Posts this week</div>
                </div>
            </div>

            <!-- Chart Section -->
            <div class="chart-container">
                <canvas id="rankingChart"></canvas>
            </div>

            <!-- Recent Activity -->
            <section class="activity-section">
                <h2>Recent Content Generation</h2>
                <div class="activity-list" id="activityList">
                    <!-- Activity items will be injected by JS -->
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
